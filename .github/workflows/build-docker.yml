name: Build Custom Frida (hluda) with Docker

on:
  push:
    branches:
    - main
    - master
  pull_request:
    branches:
    - main
    - master
  workflow_dispatch:
    inputs:
      frida_version:
        description: "Frida version to build (default: 17.15.0)"
        required: false
        default: '17.15.0'

jobs:
  build-image:
    runs-on: ubuntu-22.04
    outputs:
      image: ${{ steps.image.outputs.image }}
    steps:
    - name: Checkout custom repo
      uses: actions/checkout@v4

    - name: Log in to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build and push Docker image
      id: image
      run: |
        IMAGE=ghcr.io/${{ github.repository }}/buildenv:${{ github.sha }}
        echo "image=$IMAGE" >> "$GITHUB_OUTPUT"
        docker build -t "$IMAGE" .
        docker push "$IMAGE"

  android_build:
    runs-on: ubuntu-22.04
    needs: build-image
    strategy:
      fail-fast: false
      matrix:
        include:
        - arch: arm
          abi: armeabi-v7a
        - arch: arm64
          abi: arm64-v8a
        - arch: x86
          abi: x86
        - arch: x86_64
          abi: x86_64

    container:
      image: ${{ needs.build-image.outputs.image }}
      volumes:
        - ${{ github.workspace }}:/work

    steps:
    - name: Verify toolchain inside container
      run: |
        echo "[*] NDK=$ANDROID_NDK_ROOT"
        ls -ld "$ANDROID_NDK_ROOT" || true
        which clang && clang --version | head -2
        which ninja && ninja --version
        which python3 && python3 --version
        which node && node --version
        which npm && npm --version
        which valac && valac --version | head -2
        which java && java -version 2>&1 | head -2
        python3 -c "import lief; print('lief', lief.__version__)"

    - name: Download Frida 17.15.0 source
      run: |
        cd /work
        git clone --depth 1 --branch 17.15.0 --recurse-submodules https://github.com/frida/frida.git frida-src

    - name: Apply rusda patches
      run: |
        set -e
        cd /work/frida-src
        # Apply superrepo patch
        git apply --exclude=releng ../patches/deliver/superrepo.patch
        # Apply core/gum patches inside subprojects
        ( cd subprojects/frida-core && git apply ../../patches/deliver/frida-core.patch )
        ( cd subprojects/frida-gum  && git apply ../../patches/deliver/frida-gum.patch )
        # Workaround generate-runtime.py SIGSEGV on x86 host
        python3 ../scripts/patch-frida-fallbacks.py \
          subprojects/frida-gum/bindings/gumjs/generate-runtime.py \
          subprojects/frida-core/src/embed-helper.py
        # Remove missing zymbiote/android resource inputs from meson.build
        python3 ../scripts/patch-meson-resources.py subprojects/frida-core/src/meson.build

    - name: Build for ${{ matrix.arch }}
      run: |
        cd /work/frida-src
        bash tools/build-android-all.sh

    - name: Verify patch
      run: |
        cd /work/frida-src
        python3 tools/verify-patch.py dist-android || true

    - name: Upload staging-${{ matrix.arch }}
      uses: actions/upload-artifact@v4
      with:
        name: staging-${{ matrix.arch }}
        path: /work/frida-src/dist-android/staging-${{ matrix.arch }}
        retention-days: 7
