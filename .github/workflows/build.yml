name: Build Custom Frida (hluda)

on:
  push:
    branches:
    - main
    - master
  pull_request:
    branches:
    - main
    - master
  workflow_dispatch:
    inputs:
      frida_version:
        description: "Frida version to build (default: 17.15.0)"
        required: false
        default: '17.15.0'

jobs:
  android_build:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
        - arch: arm
          abi: armeabi-v7a
        - arch: arm64
          abi: arm64-v8a
        - arch: x86
          abi: x86
        - arch: x86_64
          abi: x86_64

    steps:
    - name: Checkout custom repo
      uses: actions/checkout@v4

    - name: Setup Node.js 22
      uses: actions/setup-node@v3
      with:
        node-version: 22

    - name: Setup JDK 17
      uses: actions/setup-java@v3
      with:
        distribution: temurin
        java-version: 17

    - name: Setup Android NDK r29
      id: setup-ndk
      uses: nttld/setup-ndk@v1
      with:
        ndk-version: r29
        local-cache: false
        link-to-sdk: true

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          build-essential ninja-build pkg-config \
          xz-utils unzip zip \
          libglib2.0-dev libssl-dev \
          valac
        pip3 install --user lief

    - name: Download Frida ${{ github.event.inputs.frida_version || '17.15.0' }} source
      run: |
        VERSION="${{ github.event.inputs.frida_version || '17.15.0' }}"
        git clone --depth 1 --branch "$VERSION" --recurse-submodules \
          https://github.com/frida/frida.git frida-src

    - name: Determine version
      id: version
      run: |
        cd frida-src
        VERSION=$(python3 releng/frida_version.py 2>/dev/null | grep -oE '[0-9]+\.[0-9]+\.[0-9]+(-dev\.[0-9]+)?' | head -1)
        if [ -z "$VERSION" ]; then
          VERSION="${{ github.event.inputs.frida_version || '17.15.0' }}"
        fi
        echo "version=$VERSION" >> "$GITHUB_OUTPUT"
        echo "version=$VERSION" >> "$GITHUB_ENV"
        echo "::notice::Building hluda $VERSION"

    - name: Apply rusda patches for ${{ matrix.arch }}
      run: |
        set -e
        cd frida-src
        # Apply superrepo patch to root
        git apply --exclude=releng "$GITHUB_WORKSPACE/patches/deliver/superrepo.patch"
        # Apply core/gum patches inside subprojects
        ( cd subprojects/frida-core && git apply "$GITHUB_WORKSPACE/patches/deliver/frida-core.patch" )
        ( cd subprojects/frida-gum  && git apply "$GITHUB_WORKSPACE/patches/deliver/frida-gum.patch" )

    - name: Build Frida for ${{ matrix.arch }}
      run: |
        cd frida-src
        export ANDROID_NDK_ROOT="${{ steps.setup-ndk.outputs.ndk-path }}"
        ./tools/build-android-all.sh

    - name: Verify patch for ${{ matrix.arch }}
      run: |
        cd frida-src
        python3 tools/verify-patch.py dist-android || true

    - name: Upload rusda binaries for ${{ matrix.arch }}
      uses: actions/upload-artifact@v4
      with:
        name: dist-android-${{ matrix.arch }}
        path: frida-src/dist-android/*.xz
        retention-days: 7

  release:
    needs: android_build
    runs-on: ubuntu-22.04
    if: github.event_name != 'pull_request'
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts/

    - name: Extract downloaded artifacts
      run: |
        find artifacts/ -type f -name '*.zip' | while read -r zip; do
          dir=$(dirname "$zip")
          unzip -q "$zip" -d "$dir"
          rm "$zip"
        done
        find artifacts/ -type f -name '*.xz' | sort

    - name: Determine version from artifacts
      id: version
      run: |
        FILE=$(find artifacts/ -name 'rusda-server-*.xz' | head -1)
        VERSION=$(basename "$FILE" | sed 's/rusda-server-\(.*\)-android-.*/\1/')
        echo "version=$VERSION" >> "$GITHUB_OUTPUT"
        echo "Version: $VERSION"

    - name: Create GitHub Release
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        VERSION="${{ steps.version.outputs.version }}"
        echo "Creating release hluda-$VERSION"
        gh release create "hluda-$VERSION" \
          --repo "ZFYy1x/frida-custom-build" \
          --title "hluda $VERSION" \
          --notes "Automated build of hluda $VERSION for Android (arm/arm64/x86/x86_64)." \
          $(find artifacts/ -name '*.xz' -printf '%p ')
