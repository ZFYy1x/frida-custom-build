name: Build Custom Frida (hluda)

on:
  push:
    branches:
    - main
    - master
  pull_request:
    branches:
    - main
    - master
  workflow_dispatch:
    inputs:
      frida_version:
        description: "Frida version to build (default: 17.15.0, latest with verified patches)"
        required: false
        default: '17.15.0'

jobs:
  android_build:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
        - arch: android-arm
          host: android-arm
          abi: armeabi-v7a
        - arch: android-arm64
          host: android-arm64
          abi: arm64-v8a
        - arch: android-x86
          host: android-x86
          abi: x86
        - arch: android-x86_64
          host: android-x86_64
          abi: x86_64

    steps:
    - name: Checkout custom repo
      uses: actions/checkout@v4

    - name: Setup Node.js 18
      uses: actions/setup-node@v3
      with:
        node-version: 18

    - name: Setup JDK 17
      uses: actions/setup-java@v3
      with:
        distribution: temurin
        java-version: 17

    - name: Setup Android NDK r29
      id: setup-ndk
      uses: nttld/setup-ndk@v1
      with:
        ndk-version: r29
        local-cache: false
        link-to-sdk: true

    - name: Setup Python 3.9
      uses: actions/setup-python@v4
      with:
        python-version: 3.9

    - name: Install build dependencies
      run: |-
        sudo apt-get update && DEBIAN_FRONTEND=noninteractive sudo apt-get install -y \
          build-essential tree ninja-build \
          gcc-multilib g++-multilib lib32stdc++-9-dev \
          flex bison ruby ruby-dev \
          python3-requests python3-setuptools python3-dev python3-pip \
          libc6-dev libc6-dev-i386 \
          ccache pkg-config \
          libglib2.0-dev liblzma-dev liblz4-dev \
          libssl-dev libreadline-dev libxml2-dev \
          libsqlite3-dev libcapstone-dev libyaml-dev \
          libunwind-dev autoconf automake libtool \
          cmake graphviz
        sudo gem install fpm -v 1.11.0 --no-document
        python3 -m pip install lief

    - name: Build Frida for ${{ matrix.arch }}
      shell: bash
      env:
        ANDROID_NDK_ROOT: ${{ steps.setup-ndk.outputs.ndk-path }}
      run: |-
        set -e

        git config --global user.name "GitHub Actions"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

        export NDK="$ANDROID_NDK_ROOT"
        export PATH="$NDK/toolchains/llvm/prebuilt/linux-x86_64/bin:$PATH"
        export ANDROID_NDK_ROOT="$NDK"

        # Use workflow_dispatch input, or default to 17.15.0 (latest with verified patches)
        VERSION="${{ github.event.inputs.frida_version }}"
        if [ -z "$VERSION" ]; then
          VERSION="17.15.0"
        fi
        echo "Building Frida $VERSION for ${{ matrix.arch }}"

        # Clone frida with submodules
        git clone --recurse-submodules https://github.com/frida/frida.git frida-src
        cd frida-src
        git checkout "$VERSION"
        git submodule update --init --recursive --depth 1

        echo "Apply Florida patches to frida-core and frida-gum"
        for path in ../patches/*
        do
          name=$(basename "$path")
          real=$(realpath "$path")
          echo "Apply patches in $real to frida-src/subprojects/$name"
          cd subprojects/$name
          git apply "$real"/*.patch || { echo "Failed to apply patch in $name"; exit 1; }
          cd ../../
        done

        # Configure and build
        mkdir -p build-${{ matrix.host }}
        cd build-${{ matrix.host }}

        ../frida-src/configure \
          --host=${{ matrix.host }} \
          --prefix=/tmp/frida-custom-${{ matrix.host }} \
          --enable-server \
          --enable-gadget \
          --enable-inject

        make -j$(nproc)
        make install

        echo "Collect artifacts"
        mkdir -p /tmp/frida-out-${{ matrix.arch }}

        # Copy server, inject, gadget
        if [ -f "/tmp/frida-custom-${{ matrix.host }}/bin/rusda-server" ]; then
          cp "/tmp/frida-custom-${{ matrix.host }}/bin/rusda-server" /tmp/frida-out-${{ matrix.arch }}/
        elif [ -f "subprojects/frida-core/server/frida-server" ]; then
          cp subprojects/frida-core/server/frida-server /tmp/frida-out-${{ matrix.arch }}/
        fi

        if [ -f "/tmp/frida-custom-${{ matrix.host }}/bin/rusda-inject" ]; then
          cp "/tmp/frida-custom-${{ matrix.host }}/bin/rusda-inject" /tmp/frida-out-${{ matrix.arch }}/
        fi

        # Find gadget
        find /tmp/frida-custom-${{ matrix.host }}/lib -name "rusda-gadget.so" -exec cp {} /tmp/frida-out-${{ matrix.arch }}/ \;
        find . -name "frida-gadget.so" -exec cp {} /tmp/frida-out-${{ matrix.arch }}/ \;

        # Find agent so files
        find . -name 'frida-agent-*.so' -exec cp {} /tmp/frida-out-${{ matrix.arch }}/ \;

        ls -lh /tmp/frida-out-${{ matrix.arch }}/

    - name: Run binary anti-anti-frida patch (topatch)
      shell: bash
      run: |-
        python3 scripts/topatch.py /tmp/frida-out-${{ matrix.arch }}/rusda-server 2>/dev/null || \
        python3 scripts/topatch.py /tmp/frida-out-${{ matrix.arch }}/frida-server 2>/dev/null || true

        if [ -f /tmp/frida-out-${{ matrix.arch }}/rusda-inject ]; then
          python3 scripts/topatch.py /tmp/frida-out-${{ matrix.arch }}/rusda-inject
        fi

        for f in /tmp/frida-out-${{ matrix.arch }}/rusda-gadget.so /tmp/frida-out-${{ matrix.arch }}/frida-gadget.so; do
          [ -f "$f" ] && python3 scripts/topatch.py "$f" || true
        done

        for f in /tmp/frida-out-${{ matrix.arch }}/rusda-agent-*.so /tmp/frida-out-${{ matrix.arch }}/frida-agent-*.so; do
          [ -f "$f" ] && python3 scripts/topatch.py "$f" || true
        done

    - name: Package artifact
      shell: bash
      run: |-
        VERSION="${{ github.event.inputs.frida_version }}"
        if [ -z "$VERSION" ]; then
          VERSION="17.15.0"
        fi

        PKG="hluda-${VERSION}-android-${{ matrix.arch }}"
        mkdir -p /tmp/$PKG

        # Rename frida-* to hluda-* in output dir
        for f in /tmp/frida-out-${{ matrix.arch }}/*; do
          basename_f=$(basename "$f")
          newname=$(echo "$basename_f" | sed 's/^frida-/hluda-/')
          cp "$f" "/tmp/$PKG/$newname"
        done

        # Create start script
        printf '%s\n' '#!/bin/bash' 'PORT=custom_port' './hluda-server -l 127.0.0.1:$PORT &' 'echo "Frida listening on 127.0.0.1:$PORT"' > /tmp/$PKG/start.sh
        chmod +x /tmp/$PKG/start.sh

        # Package as tar.xz
        cd /tmp && tar cJf $PKG.tar.xz $PKG/
        ls -lh /tmp/$PKG.tar.xz

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: hluda-${{ matrix.arch }}
        path: /tmp/hluda-*.tar.xz
        retention-days: 30
