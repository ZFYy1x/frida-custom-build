name: Build Custom Frida (hluda)

on:
  push:
    branches:
    - main
    - master
  pull_request:
    branches:
    - main
    - master
  workflow_dispatch:
    inputs:
      frida_version:
        description: "Frida version to build (default: 17.15.0)"
        required: false
        default: '17.15.0'

jobs:
  android_build:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
        - arch: arm
          abi: armeabi-v7a
        - arch: arm64
          abi: arm64-v8a
        - arch: x86
          abi: x86
        - arch: x86_64
          abi: x86_64

    steps:
    - name: Checkout custom repo
      uses: actions/checkout@v4

    - name: Setup Node.js 18
      uses: actions/setup-node@v3
      with:
        node-version: 18

    - name: Setup JDK 17
      uses: actions/setup-java@v3
      with:
        distribution: temurin
        java-version: 17

    - name: Setup Android NDK r29
      id: setup-ndk
      uses: nttld/setup-ndk@v1
      with:
        ndk-version: r29
        local-cache: false
        link-to-sdk: true

    - name: Setup Python 3.9
      uses: actions/setup-python@v4
      with:
        python-version: 3.9

    - name: Install build dependencies
      run: |-
        sudo apt-get update && DEBIAN_FRONTEND=noninteractive sudo apt-get install -y \
          build-essential tree ninja-build \
          gcc-multilib g++-multilib lib32stdc++-9-dev \
          flex bison ruby ruby-dev \
          python3-requests python3-setuptools python3-dev python3-pip \
          libc6-dev libc6-dev-i386 \
          ccache pkg-config \
          libglib2.0-dev liblzma-dev liblz4-dev \
          libssl-dev libreadline-dev libxml2-dev \
          libsqlite3-dev libcapstone-dev libyaml-dev \
          libunwind-dev autoconf automake libtool \
          cmake graphviz xz-utils
        sudo gem install fpm -v 1.11.0 --no-document
        python3 -m pip install lief

    - name: Build Frida for ${{ matrix.arch }}
      shell: bash
      env:
        ANDROID_NDK_ROOT: ${{ steps.setup-ndk.outputs.ndk-path }}
      run: |-
        set -e

        git config --global user.name "GitHub Actions"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

        export NDK="$ANDROID_NDK_ROOT"
        export PATH="$NDK/toolchains/llvm/prebuilt/linux-x86_64/bin:$PATH"
        export ANDROID_NDK_ROOT="$NDK"

        VERSION="${{ github.event.inputs.frida_version }}"
        if [ -z "$VERSION" ]; then
          VERSION="17.15.0"
        fi
        echo "Building Frida $VERSION for ${{ matrix.arch }}"

        git clone --recurse-submodules https://github.com/frida/frida.git frida-src
        cd frida-src
        git checkout "$VERSION"
        git submodule update --init --recursive --depth 1

        echo "Apply superrepo patch (adds tools/build-android-all.sh)"
        git apply ../patches/deliver/superrepo.patch

        echo "Verify patches before applying"
        python3 ../tools/verify-patch.py --src . --patches ../patches/deliver/

        echo "Apply frida-core and frida-gum patches"
        git apply ../patches/deliver/frida-core.patch
        git apply ../patches/deliver/frida-gum.patch

        echo "Build using rusda script"
        export ANDROID_NDK_ROOT="$NDK"
        bash tools/build-android-all.sh

        echo "Package artifact for ${{ matrix.arch }}"
        STAGING="dist-android/staging-${{ matrix.arch }}"
        mkdir -p /tmp/hluda-out

        if [ -f "$STAGING/bin/rusda-server" ]; then
          cp "$STAGING/bin/rusda-server" /tmp/hluda-out/hluda-server
        fi
        if [ -f "$STAGING/bin/rusda-inject" ]; then
          cp "$STAGING/bin/rusda-inject" /tmp/hluda-out/hluda-inject
        fi
        BITS=""
        case "${{ matrix.arch }}" in
          arm|x86) BITS=32 ;;
          arm64|x86_64) BITS=64 ;;
        esac
        GADGET=$(find "$STAGING/lib" -path "*/${BITS}/rusda-gadget.so" | head -1 || true)
        if [ -n "$GADGET" ] && [ -f "$GADGET" ]; then
          cp "$GADGET" /tmp/hluda-out/hluda-gadget.so
        fi

        PKG_NAME="hluda-${VERSION}-android-${{ matrix.arch }}"
        mkdir -p "/tmp/${PKG_NAME}"
        cp /tmp/hluda-out/* "/tmp/${PKG_NAME}/"
        cd /tmp && tar cJf "${PKG_NAME}.tar.xz" "${PKG_NAME}/"
        ls -lh "/tmp/${PKG_NAME}.tar.xz"

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: hluda-${{ matrix.arch }}
        path: /tmp/hluda-*.tar.xz
        retention-days: 30
