name: Release dist-android

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: "GitHub Actions run ID to release artifacts from (default: latest successful run)"
        required: false
        default: ''

jobs:
  release:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
    - name: Checkout custom repo
      uses: actions/checkout@v4

    - name: Setup GitHub CLI
      run: sudo apt-get install -y gh

    - name: Determine source run ID
      id: run
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        if [ -n "${{ github.event.inputs.run_id }}" ]; then
          echo "run_id=${{ github.event.inputs.run_id }}" >> "$GITHUB_OUTPUT"
        else
          RUN_ID=$(gh run list --repo "$GITHUB_REPOSITORY" --workflow build.yml --status success --limit 1 --json databaseId --jq '.[0].databaseId')
          echo "Using latest successful run: $RUN_ID"
          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"
        fi

    - name: Download artifacts from run
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        rm -rf artifacts/
        mkdir -p artifacts/
        gh run download "${{ steps.run.outputs.run_id }}" \
          --repo "$GITHUB_REPOSITORY" \
          --name 'dist-android-*' \
          --dir artifacts/

    - name: Extract downloaded artifacts
      run: |
        find artifacts/ -type f -name '*.zip' | while read -r zip; do
          dir=$(dirname "$zip")
          unzip -q "$zip" -d "$dir"
          rm "$zip"
        done
        find artifacts/ -type f -name '*.xz' | sort

    - name: Determine version from artifacts
      id: version
      run: |
        FILE=$(find artifacts/ -name 'rusda-server-*.xz' | head -1)
        VERSION=$(basename "$FILE" | sed 's/rusda-server-\(.*\)-android-.*/\1/')
        echo "version=$VERSION" >> "$GITHUB_OUTPUT"
        echo "Version: $VERSION"

    - name: Create or update GitHub Release
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        VERSION="${{ steps.version.outputs.version }}"
        TAG="dist-android-$VERSION"
        echo "Releasing $TAG from run ${{ steps.run.outputs.run_id }}"
        gh release delete "$TAG" --repo "$GITHUB_REPOSITORY" --yes || true
        gh release create "$TAG" \
          --repo "$GITHUB_REPOSITORY" \
          --title "dist-android $VERSION" \
          --notes "Automated build of dist-android $VERSION for Android (arm/arm64/x86/x86_64)." \
          $(find artifacts/ -name '*.xz' -printf '%p ')
